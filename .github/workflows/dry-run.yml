name: build (dry run)

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Create Cache Directory
        run: mkdir -p ~/cache

      - name: Cache Directory
        id: cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/cache
          key: cache-${{ runner.os }}

      - name: Pull Docker Image
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          docker pull paperist/texlive-ja:latest
          docker save -o ~/cache/texlive.tar paperist/texlive-ja:latest

      - name: Load Docker Image
        if: steps.cache.outputs.cache-hit == 'true'
        run: docker load -i ~/cache/texlive.tar

      - name: Build LaTeX
        run: make build

      - name: Check Artifacts
        run: |
          # Check if the PDF file exists
          if [ ! -e ./build/sample.pdf ]; then
            echo "No PDF file found in the ./build directory."
            exit 1
          fi
